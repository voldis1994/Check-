name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: lint-type-pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Check/System
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: python -m pytest -q --junitxml=pytest-results.xml
      - name: Upload results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: Check/System/pytest-results.xml
