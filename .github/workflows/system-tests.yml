name: system-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: pytest (no broker / no MT4)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Check/System
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Check/System/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pytest suite
        run: |
          python -m pytest -q --junitxml=pytest-results.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: Check/System/pytest-results.xml
